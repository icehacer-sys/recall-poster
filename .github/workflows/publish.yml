name: publish

# Perpetual poll-and-rechain runner. GitHub throttles fine-grained cron, so one job
# loops for ~5h (pull latest state -> top-up queue -> render+commit slides -> publish due
# posts), then re-dispatches itself. A sparse safety cron restarts the chain if it dies.
#
# Idempotency: state.json records postedAt per post. The state push after publishing is
# RETRIED and treated as FATAL (no `|| true`): if it cannot be persisted, the run aborts
# rather than letting a later checkout of stale state re-post the same carousel.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # safety net: relaunch a dead chain (concurrency keeps it to one)

concurrency:
  group: recall-poster
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: poll, render, publish loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Derived from the repo so there is no secret to set (and no placeholder to get wrong).
          GITHUB_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/main
          BOT_CONFIRM_LIVE: "yes"
        run: |
          set -u
          git config user.name "recall-poster bot"
          git config user.email "bot@users.noreply.github.com"

          # Push the working tree; retry on rejection. Returns non-zero if it never succeeds.
          push_retry() {
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash && git push && return 0
              sleep 5
            done
            return 1
          }

          # Top up the content queue once per chain link (not on every poll).
          npm run generate || true
          git add -A
          git commit -m "chore: queue top-up [skip ci]" || true
          push_retry || echo "warn: queue push failed"

          # Poll every 60s so a due post publishes within ~1 minute of its scheduled time.
          end=$(( $(date +%s) + 5 * 3600 ))
          while [ "$(date +%s)" -lt "$end" ]; do
            git pull --rebase --autostash || true   # adopt state from any sibling chain link

            npm run render || true
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore: render slides [skip ci]"
              push_retry || echo "warn: slide push failed, will retry next loop"
            fi

            npm run live || true
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore: record post state [skip ci]"
              # State MUST persist, or a future checkout could re-post. Abort the run if it can't.
              push_retry || { echo "FATAL: could not push post state; aborting to avoid double-post"; exit 1; }
            fi

            sleep 60
          done

      - name: rechain
        if: ${{ always() && !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml
